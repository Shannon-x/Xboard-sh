name: Docker Build and Publish

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Build admin frontend natively on x86 ───────────────────────────
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Xboard-sh (for patch script)
        uses: actions/checkout@v4

      - name: Clone XBoard-admin
        run: git clone --depth 1 --branch main https://github.com/Shannon-x/XBoard-admin.git xboard-admin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xboard-admin/package-lock.json

      - name: Patch and build admin frontend
        run: |
          cd xboard-admin
          sh ${{ github.workspace }}/scripts/patch-admin.sh
          npm install
          npm run build

      - name: Upload admin dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: xboard-admin/dist/
          retention-days: 1

  # ── Job 2: Build per-arch image natively (no QEMU) ────────────────────────
  build-image:
    runs-on: ${{ matrix.runner }}
    needs: build-admin
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prebuilt admin dist
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: prebuilt-admin-dist/

      # Docker image names must be lowercase
      - name: Set lowercase image name
        id: image
        run: |
          echo "name=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in app.php
        run: |
          VERSION=$(date '+%Y%m%d')-$(git rev-parse --short HEAD)
          sed -i "s/'version' => '.*'/'version' => '$VERSION'/g" config/app.php
          echo "Updated version to: $VERSION"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.suffix }}
          cache-to: type=gha,scope=build-${{ matrix.suffix }},mode=max
          build-args: |
            CACHEBUST=${{ github.sha }}
            REPO_URL=https://github.com/${{ github.repository }}
            BRANCH_NAME=${{ github.ref_name }}
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Job 3: Merge into multi-arch manifest ─────────────────────────────────
  merge-manifest:
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code (for metadata)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-arm64
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker image names must be lowercase
      - name: Set lowercase image name
        id: image
        run: |
          echo "name=$(echo '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create and push multi-arch manifest
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | sed 's/^/--tag /' | tr '\n' ' ')
          DIGESTS=$(ls /tmp/digests | xargs -I {} echo "${{ steps.image.outputs.name }}@sha256:{}" | tr '\n' ' ')
          docker buildx imagetools create $TAGS $DIGESTS

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ steps.image.outputs.name }}:latest
