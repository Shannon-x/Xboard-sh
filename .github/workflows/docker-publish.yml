name: Docker Build and Publish

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build admin frontend natively on x86 ─────────────────────────
  build-admin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Xboard-sh (for patch script)
        uses: actions/checkout@v4
        with:
          path: xboard-sh

      - name: Checkout XBoard-admin
        uses: actions/checkout@v4
        with:
          repository: Shannon-x/XBoard-admin
          ref: main
          path: xboard-admin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xboard-admin/package-lock.json

      - name: Patch and build admin frontend
        run: |
          cd xboard-admin
          sh ${{ github.workspace }}/xboard-sh/scripts/patch-admin.sh
          npm install
          npm run build

      - name: Upload admin dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: xboard-admin/dist/
          retention-days: 1

  # ── Job 2: Build & push multi-arch Docker image ──────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: build-admin
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prebuilt admin dist
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: prebuilt-admin-dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get_version
        run: echo "version=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: Update version in app.php
        run: |
          VERSION=$(date '+%Y%m%d')-$(git rev-parse --short HEAD)
          sed -i "s/'version' => '.*'/'version' => '$VERSION'/g" config/app.php
          echo "Updated version to: $VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CACHEBUST=${{ github.sha }}
            REPO_URL=https://github.com/${{ github.repository }}
            BRANCH_NAME=${{ github.ref_name }}
          provenance: false
